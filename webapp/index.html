<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Poker Room</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
body{font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(ellipse at 50% 20%,#201a30,#12101c 50%,#0a0910);
  color:#e8ecf2;overflow:hidden;height:100dvh;width:100vw;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;height:100dvh}
.top{display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;padding-top:calc(6px + var(--st));
  background:linear-gradient(180deg,rgba(0,0,0,.5),rgba(0,0,0,.2));
  backdrop-filter:blur(8px);z-index:20;flex-shrink:0}
.top b{font-size:13px;color:#e8c84a;letter-spacing:.5px}
.top b span{color:#8a7a5a}
.top-r{display:flex;gap:8px;align-items:center}
.top-hn{font-size:10px;color:#6a7a8c;font-weight:600}
.top-ph{font-size:9px;padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;background:rgba(232,200,74,.08);color:#e8c84a;border:1px solid rgba(232,200,74,.12)}
.tw{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px}
.felt{position:relative;width:98%;max-width:580px;aspect-ratio:2/1;
  background:radial-gradient(ellipse at 50% 46%,#28a058,#1f8a48 25%,#187a3c 45%,#10682e 65%,#0a5422 80%,#064a1c);
  border-radius:48%;border:6px solid #1a3020;
  box-shadow:0 0 0 3px #0e1e14,0 0 0 8px rgba(10,30,15,.6),inset 0 2px 30px rgba(0,0,0,.15),0 8px 40px rgba(0,0,0,.4)}
.felt::after{content:'';position:absolute;inset:8px;border-radius:48%;border:1px solid rgba(255,255,255,.04);pointer-events:none}
.potb{position:absolute;top:17%;left:50%;transform:translateX(-50%);text-align:center;z-index:5;pointer-events:none}
.potb.h{display:none}
.potl{font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.potc{display:flex;gap:2px;justify-content:center;margin:3px 0}
.pchip{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#e8c84a,#d4a520);border:1.5px solid #b8922a;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.potv{font-size:18px;font-weight:900;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.4),0 0 20px rgba(232,200,74,.15)}
.brd{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);display:flex;gap:5px;z-index:5}
.cd{border-radius:6px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.cl{width:48px;height:68px}.cs{width:34px;height:49px}
.cf{width:100%;height:100%;border-radius:6px;position:relative;background:linear-gradient(170deg,#fff,#f5f3ee 40%,#ece8e0);border:1px solid #d4d0c8}
.cf.r{color:#cc1122}.cf.bk{color:#1a1e2e}
.ctl{position:absolute;top:2px;left:4px;line-height:1}
.ctl b{display:block;font-weight:900}.ctl i{font-style:normal;display:block}
.cl .ctl b{font-size:13px}.cl .ctl i{font-size:10px}
.cs .ctl b{font-size:10px}.cs .ctl i{font-size:7px}
.cc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.cl .cc{font-size:22px}.cs .cc{font-size:16px}
.cbr{position:absolute;bottom:2px;right:4px;line-height:1;transform:rotate(180deg)}
.cl .cbr b{font-size:13px}.cl .cbr i{font-size:10px}
.cs .cbr b{font-size:10px}.cs .cbr i{font-size:7px}
.cb{width:100%;height:100%;border-radius:6px;background:linear-gradient(145deg,#c0282a,#9a1c1e);border:1.5px solid #d63535;position:relative;overflow:hidden}
.cb::before{content:'';position:absolute;inset:4px;border-radius:3px;border:1px solid rgba(255,255,255,.12)}
.cb::after{content:'♠';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:rgba(255,255,255,.08)}
.ce{border-radius:6px;border:1.5px dashed rgba(255,255,255,.06);background:rgba(0,0,0,.06)}
.ce.cl{width:48px;height:68px}
.st{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:6;transform:translate(-50%,-50%);transition:opacity .3s}
.sp{background:linear-gradient(180deg,#1e2838,#141c28);border-radius:10px;padding:4px 10px 5px;text-align:center;border:1px solid #2a3648;min-width:70px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.st.on .sp{border-color:#e8c84a;box-shadow:0 0 0 2px rgba(232,200,74,.2),0 0 16px rgba(232,200,74,.15)}
.st.wi .sp{border-color:#e8c84a;background:linear-gradient(180deg,#2a2818,#1e1c14);box-shadow:0 0 20px rgba(232,200,74,.25)}
.st.fd{opacity:.3}.st.so{opacity:.15}
.sn{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px;color:#d0d8e4}
.st.me .sn{color:#e8c84a}
.ss{font-size:9px;font-weight:600;color:#7a8a9c;margin-top:1px}
.st.on .ss{color:#e8c84a}
.sa{width:42px;height:42px;border-radius:50%;margin-bottom:3px;background:linear-gradient(135deg,#2a3850,#1a2838);border:2.5px solid #3a4a60;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#6a8aaa;position:relative;transition:border-color .3s,box-shadow .3s}
.st.on .sa{border-color:#e8c84a;box-shadow:0 0 0 3px rgba(232,200,74,.15);animation:gp 2s ease-in-out infinite alternate}
@keyframes gp{from{box-shadow:0 0 0 3px rgba(232,200,74,.1),0 0 8px rgba(232,200,74,.1)}to{box-shadow:0 0 0 4px rgba(232,200,74,.25),0 0 18px rgba(232,200,74,.2)}}
.st.wi .sa{border-color:#e8c84a;box-shadow:0 0 20px rgba(232,200,74,.4)}
.sc{display:flex;gap:2px;margin-top:3px}
.sbt{position:absolute;z-index:5;font-size:9px;color:#e8c84a;font-weight:700;background:rgba(10,15,25,.75);padding:2px 7px;border-radius:8px;white-space:nowrap;border:1px solid rgba(232,200,74,.15);box-shadow:0 1px 4px rgba(0,0,0,.2);transform:translate(-50%,-50%)}
.sbg{font-size:7px;padding:2px 6px;border-radius:4px;margin-top:2px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.b-f{background:rgba(239,68,68,.12);color:#ef4444}.b-ch{background:rgba(34,197,94,.12);color:#22c55e}
.b-cl{background:rgba(59,130,246,.12);color:#3b82f6}.b-r{background:rgba(232,200,74,.12);color:#e8c84a}
.b-ai{background:rgba(255,100,100,.15);color:#ff8080}
.dc{position:absolute;bottom:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#fff,#e0e0e0);color:#333;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;border:1px solid #aaa;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sr{font-size:8px;color:#5ee6c8;font-weight:700;margin-top:2px}
.dl{position:absolute;top:62%;left:50%;transform:translate(-50%,-50%);padding:12px 36px;border-radius:26px;background:linear-gradient(135deg,#28c05e,#1ea84c);color:#fff;font:800 15px/1 'Inter',sans-serif;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(34,180,80,.35);text-transform:uppercase;letter-spacing:1.5px;z-index:10}
.dl:active{transform:translate(-50%,-50%) scale(.94)}.dl.h{display:none}
.wb{position:absolute;top:6%;left:50%;transform:translateX(-50%);background:rgba(10,8,16,.92);border:1.5px solid rgba(232,200,74,.4);border-radius:14px;padding:10px 24px;text-align:center;z-index:50;white-space:nowrap;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.4);animation:bp .35s cubic-bezier(.175,.885,.32,1.275)}
.wb.h{display:none}.wbn{color:#e8c84a;font-size:15px;font-weight:800}.wbh{color:#5ee6c8;font-size:12px;font-weight:600;margin-top:3px}
@keyframes bp{from{opacity:0;transform:translateX(-50%) scale(.8) translateY(-8px)}}
.rf{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(232,200,74,.08);border:1px solid rgba(232,200,74,.2);border-radius:14px;padding:9px 22px;cursor:pointer;z-index:15}.rf.h{display:none}.rf span{color:#e8c84a;font-size:12px;font-weight:700}
.ap{flex-shrink:0;background:linear-gradient(180deg,#111825,#0e1420);border-top:1px solid #1c2535;padding:8px 10px;padding-bottom:calc(10px + var(--sb));z-index:20}.ap.h{display:none}
.at{text-align:center;font-size:11px;color:#e8c84a;font-weight:700;margin-bottom:5px}
.asr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.asr input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#1c2535,#e8c84a);outline:none}
.asr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffd860,#e8c84a);border:2px solid #fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.asi{width:68px;padding:6px 4px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid #1c2535;color:#e8ecf2;font:700 13px/1 'Inter',sans-serif;text-align:center;outline:none}
.apr{display:flex;gap:4px;margin-bottom:7px;justify-content:center;flex-wrap:wrap}
.apr button{padding:4px 9px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid #1c2535;color:#5c6c80;font:600 10px/1 'Inter',sans-serif;cursor:pointer}
.apr button:active{background:rgba(232,200,74,.1);color:#e8c84a;border-color:rgba(232,200,74,.25)}
.ab{display:flex;gap:6px}
.abtn{flex:1;padding:13px 4px;border-radius:12px;border:none;font:800 13px/1.2 'Inter',sans-serif;cursor:pointer;text-transform:uppercase;letter-spacing:.3px}
.abtn:active{transform:scale(.95)}
.abtn sub{font-size:9px;font-weight:600;opacity:.6;display:block;margin-top:2px}
.bf{background:#1c1215;color:#ef4444;border:1.5px solid rgba(239,68,68,.18)}
.bch{background:#121c15;color:#22c55e;border:1.5px solid rgba(34,197,94,.18)}
.bcl{background:#12151c;color:#3b82f6;border:1.5px solid rgba(59,130,246,.18)}
.br{background:#1c1a10;color:#e8c84a;border:1.5px solid rgba(232,200,74,.18)}
.bai{background:linear-gradient(135deg,#1c1212,#221515);color:#ff8080;border:1.5px solid rgba(239,68,68,.2)}
.ov{position:fixed;inset:0;background:rgba(8,6,14,.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.ov.h{display:none}
.md{background:linear-gradient(145deg,#1a2030,#121825);border-radius:18px;padding:26px 22px;width:88%;max-width:320px;border:1px solid #2a3448;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.md h2{color:#e8c84a;font-size:18px;margin-bottom:16px;text-align:center;font-weight:800}
.md label{display:block;font-size:9px;color:#5c6c80;margin-bottom:3px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.md input{width:100%;padding:11px 13px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid #2a3448;color:#e8ecf2;font:600 15px/1 'Inter',sans-serif;margin-bottom:13px;outline:none}
.md input:focus{border-color:rgba(232,200,74,.4)}
.mdb{width:100%;padding:13px;border-radius:13px;border:none;font:800 14px/1 'Inter',sans-serif;cursor:pointer;text-transform:uppercase;letter-spacing:.8px}
.mdb:active{opacity:.8}
.mdb.gr{background:linear-gradient(135deg,#28c05e,#1ea84c);color:#fff;box-shadow:0 4px 16px rgba(34,180,80,.3)}
.mdb.gl{background:linear-gradient(135deg,#e8c84a,#d4a520);color:#0a0910;box-shadow:0 4px 16px rgba(232,200,74,.3)}
.tst{position:fixed;top:calc(48px + var(--st));left:50%;transform:translateX(-50%);background:rgba(220,50,50,.92);color:#fff;padding:8px 18px;border-radius:10px;font:600 11px/1 'Inter',sans-serif;z-index:200;pointer-events:none;animation:fi .2s,fo .2s 2.6s forwards}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@keyframes fo{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
</style>
</head>
<body>
<div class="app">
<div class="top"><b>♠ POKER <span>ROOM</span></b><div class="top-r"><span class="top-hn" id="hn"></span><span class="top-ph" id="pl">—</span></div></div>
<div class="tw">
<div class="felt" id="felt">
<div class="potb h" id="pb"><div class="potl">POT</div><div class="potc" id="pc"></div><div class="potv" id="pv"></div></div>
<div class="brd" id="bd"></div>
<div id="ss"></div>
<button class="dl h" id="dbtn" onclick="doAct('deal')">Роздати</button>
<div class="wb h" id="wb"><div class="wbn" id="wn"></div><div class="wbh" id="wh"></div></div>
</div>
<div class="rf h" id="rfb" onclick="openRB()"><span>💰 Поповнити фішки</span></div>
</div>
<div class="ap h" id="ap">
<div class="at" id="atl">Ваш хід</div>
<div class="asr" id="asr"><input type="range" id="asr1" min="0" max="100"><input type="number" class="asi" id="asv"></div>
<div class="apr" id="apr1"></div>
<div class="ab" id="ab1"></div>
</div>
</div>
<div class="ov" id="jo"><div class="md"><h2>♠ Сісти за стіл</h2><label>Ваше ім'я</label><input id="jn" placeholder="Ім'я" maxlength="16"/><label>Бай-ін</label><input id="jb" type="number" value="100"/><button class="mdb gr" onclick="doJoin()">Сісти за стіл</button></div></div>
<div class="ov h" id="ro"><div class="md"><h2>💰 Поповнити</h2><label>Сума</label><input id="ra" type="number" value="100"/><button class="mdb gl" onclick="doRB()">Поповнити</button></div></div>
<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function aud(){if(AC.state==='suspended')AC.resume()}
function sfx(t){aud();const n=AC.currentTime;
if(t==='deal'){const b=AC.createBuffer(1,AC.sampleRate*.06,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.2));const s=AC.createBufferSource();s.buffer=b;const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=1;const g=AC.createGain();g.gain.value=.12;s.connect(f);f.connect(g);g.connect(AC.destination);s.start(n)}
else if(t==='chips'){for(let j=0;j<3;j++){const b=AC.createBuffer(1,AC.sampleRate*.04,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.15))*Math.sin(i*.3);const s=AC.createBufferSource();s.buffer=b;const h=AC.createBiquadFilter();h.type='highpass';h.frequency.value=2000;const g=AC.createGain();g.gain.value=.08;s.connect(h);h.connect(g);g.connect(AC.destination);s.start(n+j*.03)}}
else if(t==='check'){const b=AC.createBuffer(1,AC.sampleRate*.03,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.sin(i*.15)*Math.exp(-i/(d.length*.3))*.5;const s=AC.createBufferSource();s.buffer=b;const g=AC.createGain();g.gain.value=.15;s.connect(g);g.connect(AC.destination);s.start(n)}
else if(t==='fold'){const b=AC.createBuffer(1,AC.sampleRate*.08,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.4))*.3;const s=AC.createBufferSource();s.buffer=b;const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=1500;const g=AC.createGain();g.gain.value=.08;s.connect(f);f.connect(g);g.connect(AC.destination);s.start(n)}
else if(t==='win'){[523,659,784].forEach((fr,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,n+i*.08);g.gain.exponentialRampToValueAtTime(.001,n+i*.08+.5);o.connect(g);g.connect(AC.destination);o.start(n+i*.08);o.stop(n+i*.08+.5)})}
else if(t==='turn'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(880,n);o.frequency.exponentialRampToValueAtTime(660,n+.08);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.12)}
else if(t==='click'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=1000;g.gain.setValueAtTime(.05,n);g.gain.exponentialRampToValueAtTime(.001,n+.03);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.03)}}

const tg=window.Telegram?.WebApp;let ws,myId,myName="Player",gs=null,pgs=null,joined=false;
const rid=new URLSearchParams(location.search).get("room")||"default";
const SM={s:"♠",h:"♥",d:"♦",c:"♣"},SC={s:"bk",h:"r",d:"r",c:"bk"},RD={T:"10"};

if(tg){tg.ready();tg.expand();try{tg.requestFullscreen?.()}catch(e){}try{tg.disableVerticalSwipes?.()}catch(e){}
try{setTimeout(()=>tg.addToHomeScreen?.(),5000)}catch(e){}
if(tg.safeAreaInset){document.documentElement.style.setProperty("--st",(tg.safeAreaInset.top||0)+"px");document.documentElement.style.setProperty("--sb",(tg.safeAreaInset.bottom||0)+"px")}
if(tg.initDataUnsafe?.user){myName=tg.initDataUnsafe.user.first_name||"Player";myId=String(tg.initDataUnsafe.user.id);document.getElementById("jn").value=myName}}

function conn(){const p=location.protocol==="https:"?"wss:":"ws:";ws=new WebSocket(`${p}//${location.host}/ws/${rid}`);
ws.onopen=()=>ws.send(JSON.stringify({init_data:tg?.initData||"",user_id:myId||`w_${Date.now()}`,name:myName}));
ws.onmessage=e=>{const m=JSON.parse(e.data);
if(m.type==="auth_ok"){myId=m.user_id;myName=m.name;document.getElementById("jn").value=myName}
else if(m.type==="state"){pgs=gs;gs=m.data;sounds();render()}
else if(m.type==="error")toast(m.message)};
ws.onclose=()=>setTimeout(conn,2000)}
function S(d){if(ws?.readyState===1)ws.send(JSON.stringify(d))}

function sounds(){if(!pgs||!gs)return;
if(gs.phase!==pgs.phase){if(['flop','turn','river','preflop'].includes(gs.phase))sfx('deal');
if(gs.phase==='showdown'&&gs.winners?.includes(myId))sfx('win')}
if(gs.turn!==pgs.turn&&gs.turn>=0&&gs.players[gs.turn]?.uid===myId)sfx('turn')}

function doJoin(){myName=document.getElementById("jn").value.trim()||"Player";
S({type:"join",buy_in:parseFloat(document.getElementById("jb").value)||100,name:myName});
joined=true;document.getElementById("jo").classList.add("h");sfx('click')}
function doAct(t,x){aud();if(t==='deal'){S({type:"deal"});sfx('deal')}
else{if(x.action==='fold')sfx('fold');else if(x.action==='check')sfx('check');else sfx('chips');S({type:"action",...x})}}
function openRB(){document.getElementById("ro").classList.remove("h")}
function doRB(){S({type:"rebuy",amount:parseFloat(document.getElementById("ra").value)||100});document.getElementById("ro").classList.add("h");sfx('chips')}

function mkC(c,lg){const d=document.createElement('div');d.className='cd '+(lg?'cl':'cs');
if(!c||c.rank==='?'){d.innerHTML='<div class="cb"></div>';return d}
const s=SM[c.suit]||c.suit,cl=SC[c.suit]||'bk',r=RD[c.rank]||c.rank;
d.innerHTML=`<div class="cf ${cl}"><div class="ctl"><b>${r}</b><i>${s}</i></div><div class="cc">${s}</div><div class="cbr"><b>${r}</b><i>${s}</i></div></div>`;return d}

function spos(n){const L={
2:[{x:50,y:90,bx:50,by:74},{x:50,y:6,bx:50,by:22}],
3:[{x:50,y:90,bx:50,by:74},{x:6,y:34,bx:18,by:40},{x:94,y:34,bx:82,by:40}],
4:[{x:50,y:90,bx:50,by:74},{x:4,y:50,bx:16,by:50},{x:50,y:6,bx:50,by:22},{x:96,y:50,bx:84,by:50}],
5:[{x:50,y:90,bx:50,by:74},{x:4,y:58,bx:16,by:52},{x:20,y:6,bx:26,by:22},{x:80,y:6,bx:74,by:22},{x:96,y:58,bx:84,by:52}],
6:[{x:50,y:90,bx:50,by:74},{x:3,y:62,bx:15,by:56},{x:8,y:8,bx:18,by:22},{x:50,y:2,bx:50,by:18},{x:92,y:8,bx:82,by:22},{x:97,y:62,bx:85,by:56}],
7:[{x:50,y:90,bx:50,by:74},{x:3,y:66,bx:15,by:58},{x:3,y:26,bx:15,by:30},{x:28,y:3,bx:32,by:19},{x:72,y:3,bx:68,by:19},{x:97,y:26,bx:85,by:30},{x:97,y:66,bx:85,by:58}],
8:[{x:50,y:90,bx:50,by:74},{x:3,y:68,bx:15,by:60},{x:3,y:34,bx:15,by:38},{x:18,y:4,bx:24,by:20},{x:50,y:2,bx:50,by:18},{x:82,y:4,bx:76,by:20},{x:97,y:34,bx:85,by:38},{x:97,y:68,bx:85,by:60}],
9:[{x:50,y:90,bx:50,by:74},{x:3,y:70,bx:15,by:62},{x:3,y:38,bx:15,by:40},{x:13,y:6,bx:20,by:20},{x:38,y:2,bx:40,by:18},{x:62,y:2,bx:60,by:18},{x:87,y:6,bx:80,by:20},{x:97,y:38,bx:85,by:40},{x:97,y:70,bx:85,by:62}]
};return L[n]||L[2]}

function render(){if(!gs)return;
const me=gs.players.find(p=>p.uid===myId);
if(!me&&!joined)document.getElementById("jo").classList.remove("h");else document.getElementById("jo").classList.add("h");
const rb=document.getElementById("rfb");
if(me&&(me.sitting_out||(me.stack<=0&&gs.phase==="showdown")))rb.classList.remove("h");else rb.classList.add("h");
const ph={waiting:"Очікування",preflop:"Префлоп",flop:"Флоп",turn:"Тьорн",river:"Рівер",showdown:"Шоудаун"};
document.getElementById("pl").textContent=ph[gs.phase]||"";
document.getElementById("hn").textContent=gs.hand_num?`#${gs.hand_num}`:"";
const pb=document.getElementById("pb");
if(gs.pot>0){pb.classList.remove("h");document.getElementById("pv").textContent=`${gs.currency}${gs.pot}`;
document.getElementById("pc").innerHTML=Array(Math.min(6,Math.max(1,Math.ceil(gs.pot/(gs.bb*5))))).fill('<div class="pchip"></div>').join('')}
else pb.classList.add("h");
const bd=document.getElementById("bd");bd.innerHTML="";
for(let i=0;i<5;i++){if(i<gs.board.length)bd.appendChild(mkC(gs.board[i],true));else{const e=document.createElement('div');e.className='ce cl';bd.appendChild(e)}}
const sl=document.getElementById("ss");sl.innerHTML="";const pos=spos(gs.players.length);
gs.players.forEach((p,i)=>{const ps=pos[i];if(!ps)return;
const on=i===gs.turn&&!['waiting','showdown'].includes(gs.phase);
const wi=gs.winners?.includes(p.uid);const isme=p.uid===myId;const dl=i===gs.btn;
const s=document.createElement('div');
s.className=`st${on?' on':''}${p.folded?' fd':''}${wi?' wi':''}${isme?' me':''}${p.sitting_out?' so':''}`;
s.style.cssText=`left:${ps.x}%;top:${ps.y}%`;
let ch="";if(p.hand?.length&&!p.sitting_out){const cd=document.createElement('div');cd.className='sc';p.hand.forEach(c=>cd.appendChild(mkC(c,false)));ch=cd.outerHTML}
const bm={fold:'b-f',check:'b-ch',call:'b-cl',raise:'b-r',allin:'b-ai'};
const bt={fold:'Fold',check:'Check',call:'Call',raise:'Raise',allin:'All-in'};
let bg="";if(p.action&&gs.phase!=='waiting'&&!p.sitting_out)bg=`<div class="sbg ${bm[p.action]||''}">${bt[p.action]||''}</div>`;
let hr=gs.results?.[p.uid]?`<div class="sr">${gs.results[p.uid]}</div>`:"";
s.innerHTML=`<div class="sa">${p.name?p.name.charAt(0).toUpperCase():'?'}${dl?'<div class="dc">D</div>':''}</div><div class="sp"><div class="sn">${p.name}</div><div class="ss">${p.sitting_out?'Sit out':gs.currency+p.stack}</div></div>${ch}${bg}${hr}`;
if(p.bet>0){const bc=document.createElement('div');bc.className='sbt';bc.style.cssText=`left:${ps.bx}%;top:${ps.by}%;position:absolute`;bc.textContent=gs.currency+p.bet;sl.appendChild(bc)}
sl.appendChild(s)});
document.getElementById("dbtn").classList.toggle('h',!(['waiting','showdown'].includes(gs.phase)&&gs.players.filter(p=>p.stack>0&&!p.sitting_out).length>=2&&me&&!me.sitting_out));
const wb=document.getElementById("wb");
if(gs.phase==='showdown'&&gs.winners?.length){document.getElementById("wn").textContent='🏆 '+gs.winners.map(u=>gs.players.find(p=>p.uid===u)?.name||'?').join(', ');
document.getElementById("wh").textContent=gs.results?.[gs.winners[0]]||'';wb.classList.remove('h')}else wb.classList.add('h');
rAct()}

function rAct(){const ap=document.getElementById("ap");if(!gs||!myId){ap.classList.add("h");return}
const p=gs.players[gs.turn];if(!p||p.uid!==myId||['waiting','showdown'].includes(gs.phase)){ap.classList.add("h");return}
ap.classList.remove("h");
const ca=Math.min(gs.street_bet-p.bet,p.stack),ck=gs.street_bet<=p.bet;
const mrt=gs.street_bet+gs.min_raise,mxt=p.stack+p.bet;
const sr=document.getElementById("asr1"),sv=document.getElementById("asv"),slr=document.getElementById("asr");
if(p.stack>0&&mxt>gs.street_bet){slr.style.display='flex';sr.min=mrt;sr.max=mxt;sr.value=mrt;sv.value=mrt;
sr.oninput=()=>{sv.value=sr.value;uRL()};sv.onchange=()=>{let v=+sv.value;v=Math.max(mrt,Math.min(v,mxt));sv.value=v;sr.value=v;uRL()}}
else slr.style.display='none';
const pr=document.getElementById("apr1");pr.innerHTML='';
if(p.stack>0){[{l:'Мін',v:mrt},{l:'½ пот',v:Math.max(mrt,Math.floor(gs.pot/2))},{l:'¾ пот',v:Math.max(mrt,Math.floor(gs.pot*.75))},{l:'Пот',v:Math.max(mrt,gs.pot)},{l:'All-in',v:mxt}].forEach(x=>{if(x.v<=mxt){const b=document.createElement('button');b.textContent=x.l;b.onclick=()=>{sv.value=x.v;sr.value=x.v;uRL();sfx('click')};pr.appendChild(b)}})}
const bt=document.getElementById("ab1");bt.innerHTML='';
const mk=(c,t,fn)=>{const b=document.createElement('button');b.className='abtn '+c;b.innerHTML=t;b.onclick=fn;bt.appendChild(b)};
mk('bf','Fold',()=>doAct(null,{action:'fold'}));
if(ck)mk('bch','Check',()=>doAct(null,{action:'check'}));
else{const c=Math.min(ca,p.stack);mk('bcl',`Call<sub>${gs.currency}${c}</sub>`,()=>doAct(null,{action:'call'}))}
if(p.stack>0&&mxt>gs.street_bet){if(p.stack<=ca)mk('bai',`All-in<sub>${gs.currency}${p.stack}</sub>`,()=>doAct(null,{action:'allin'}));
else{const lb=gs.street_bet>0?'Raise':'Bet';mk('br',`${lb}<sub id="rl">${gs.currency}${mrt}</sub>`,()=>{const v=+sv.value;if(v>=mxt)doAct(null,{action:'allin'});else doAct(null,{action:'raise',amount:v})})}}}

function uRL(){const el=document.getElementById("rl");if(!el||!gs)return;const v=+document.getElementById("asr1").value;const p=gs.players[gs.turn];el.textContent=v>=(p?p.stack+p.bet:0)?'All-in':`${gs.currency}${v}`}

function toast(m){const t=document.createElement('div');t.className='tst';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
conn();
</script>
